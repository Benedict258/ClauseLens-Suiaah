<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 340px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #0B1219;
      color: white;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo {
      width: 28px;
      height: 28px;
      background: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
      font-size: 16px;
      font-weight: bold;
    }
    .title {
      font-size: 18px;
      font-weight: 800;
      flex: 1;
      letter-spacing: -0.02em;
    }
    .highlight {
      color: #E0FEF6;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      transition: all 0.5s ease;
    }
    .dot-green { 
      background: #22C55E; 
    }
    .dot-yellow { 
      background: #F59E0B; 
    }
    .dot-red { 
      background: #EF4444; 
    }

    .btn {
      width: 100%;
      background: #E0FEF6;
      color: #050B10;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    .btn:hover {
      transform: scale(1.02);
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn:disabled {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.2);
      cursor: not-allowed;
    }
    .btn-secondary {
      width: 100%;
      background: rgba(255,255,255,0.05);
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .result {
      margin-top: 16px;
      padding: 20px;
      background: rgba(255,255,255,0.03);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .score-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .score {
      font-size: 42px;
      font-weight: 900;
      line-height: 1;
    }
    .severity {
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 900;
      padding: 4px 10px;
      border-radius: 6px;
      letter-spacing: 0.1em;
    }
    .high { background: rgba(239, 68, 68, 0.1); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    .medium { background: rgba(245, 158, 11, 0.1); color: #F59E0B; border: 1px solid rgba(245, 158, 11, 0.2); }
    .low { background: rgba(34, 197, 94, 0.1); color: #22C55E; border: 1px solid rgba(34, 197, 94, 0.2); }
    
    .summary {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      margin-bottom: 16px;
      font-weight: 500;
    }
    .risk-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    .risk-item {
      font-size: 12px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .risk-title { font-weight: 700; margin-bottom: 4px; color: white; }
    .risk-desc { color: rgba(255,255,255,0.4); font-size: 11px; line-height: 1.4; }

    .loader {
      border: 2px solid rgba(255,255,255,0.1);
      border-top: 2px solid #E0FEF6;
      border-radius: 50%;
      width: 14px;
      height: 14px;
      animation: spin 1s linear infinite;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <div class="title">Clause<span class="highlight">Lens</span></div>
    <div id="statusDot" class="status-dot"></div>
  </div>

  <div id="loading" style="display: none; text-align: center; padding: 20px;">
    <div class="loader" style="display: inline-block; width: 32px; height: 32px; margin-bottom: 12px;"></div>
    <p style="font-size: 14px; color: rgba(255,255,255,0.4); font-weight: 600;">Analyzing policies...</p>
  </div>

  <div id="content">
    <button id="analyzeBtn" class="btn">
      <span id="btnText">Re-Analyze This Page</span>
    </button>

    <div id="result" class="result" style="display: none;">
      <div class="score-container">
        <div>
           <span class="score" id="scoreValue">0</span>
           <span style="font-size: 14px; color: #999;">/ 10</span>
        </div>
        <span class="severity" id="severityText">Scanning</span>
      </div>
      <p class="summary" id="summaryText">No data found yet.</p>
      <div class="risk-list" id="riskList"></div>
      
      <button id="dashboardBtn" class="btn-secondary">
        Open Dashboard
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
